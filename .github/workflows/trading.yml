name: NIFTY Options Trading Bot

on:
  schedule:
    # Run Monday to Friday at 9:10 AM IST (3:40 AM UTC)
    - cron: '40 3 * * 1-5'
  
  workflow_dispatch:
    inputs:
      mode:
        description: 'Trading Mode'
        required: true
        default: 'simulation'
        type: choice
        options:
          - simulation
          - live
      capital:
        description: 'Trading Capital (INR)'
        required: false
        default: '10000'
        type: string
      max_trades:
        description: 'Max Daily Trades'
        required: false
        default: '8'
        type: string

env:
  TZ: 'Asia/Kolkata'

jobs:
  trading:
    name: Execute Trading Session
    runs-on: ubuntu-latest
    timeout-minutes: 420  # 7 hours max (market hours + buffer)
    
    steps:
      - name: 🚀 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scipy kiteconnect colorama tabulate pytz schedule aiohttp
      
      - name: 📅 Check Trading Day & Market Hours
        run: |
          python -c "
          from datetime import datetime
          import pytz
          
          # IST timezone
          ist = pytz.timezone('Asia/Kolkata')
          now = datetime.now(ist)
          
          # Check if today is trading day (Monday=0 to Friday=4)
          is_trading_day = now.weekday() < 5  # Monday to Friday
          
          print(f'📅 Today: {now.strftime(\"%Y-%m-%d\")} ({now.strftime(\"%A\")})')
          print(f'🏪 Trading Day: {\"YES\" if is_trading_day else \"NO\"}')
          
          if not is_trading_day:
              print('⏸️ Market closed today - exiting')
              exit(78)  # Special exit code for non-trading days
          
          # Market hours: 9:15 AM to 3:30 PM IST
          market_start = now.replace(hour=9, minute=15, second=0, microsecond=0)
          market_end = now.replace(hour=15, minute=30, second=0, microsecond=0)
          
          print(f'🕐 Current: {now.strftime(\"%H:%M:%S\")} IST')
          print(f'📈 Market: {market_start.strftime(\"%H:%M\")} - {market_end.strftime(\"%H:%M\")} IST')
          print(f'✅ Ready for trading!')
          "
      
      - name: 🔐 Validate Secrets
        run: |
          if [ -z "${{ secrets.API_KEY }}" ]; then
            echo "❌ API_KEY secret missing"
            echo "Go to Repository Settings → Secrets and Variables → Actions"
            echo "Add API_KEY with your Kite Connect API key"
            exit 1
          fi
          
          if [ -z "${{ secrets.ACCESS_TOKEN }}" ]; then
            echo "❌ ACCESS_TOKEN secret missing"  
            echo "Go to Repository Settings → Secrets and Variables → Actions"
            echo "Add ACCESS_TOKEN with your Kite Connect access token"
            exit 1
          fi
          
          echo "✅ All required secrets found"
      
      - name: ⚙️ Set Trading Parameters
        run: |
          # Set trading mode
          if [ "${{ github.event.inputs.mode }}" = "live" ]; then
            echo "LIVE_TRADING_MODE=true" >> $GITHUB_ENV
            echo "🔴 LIVE TRADING MODE ENABLED"
            echo "💰 REAL MONEY WILL BE USED!"
          else
            echo "LIVE_TRADING_MODE=false" >> $GITHUB_ENV
            echo "🟡 SIMULATION MODE"
          fi
          
          # Set capital (default to 10000 as requested)
          CAPITAL="${{ github.event.inputs.capital }}"
          if [ -z "$CAPITAL" ]; then
            CAPITAL="10000"
          fi
          echo "TRADING_CAPITAL=$CAPITAL" >> $GITHUB_ENV
          echo "💵 Capital: ₹$CAPITAL"
          
          # Set max trades
          MAX_TRADES="${{ github.event.inputs.max_trades }}"
          if [ -z "$MAX_TRADES" ]; then
            MAX_TRADES="8"
          fi
          echo "MAX_DAILY_TRADES=$MAX_TRADES" >> $GITHUB_ENV
          echo "📊 Max Trades: $MAX_TRADES"
          
          # Set log level
          echo "LOG_LEVEL=INFO" >> $GITHUB_ENV
      
      - name: 🏥 Pre-Trading Health Check
        run: |
          python -c "
          # Test imports
          try:
              import pandas, numpy, scipy, asyncio, aiohttp
              import kiteconnect, colorama, tabulate, pytz, schedule
              from datetime import datetime, timedelta
              import time, threading, queue, json, signal, logging, os, sys
              from pathlib import Path
              print('✅ All dependencies imported successfully')
          except ImportError as e:
              print(f'❌ Import error: {e}')
              exit(1)
          
          # Test basic configuration
          print(f'📊 System check completed')
          print(f'💰 Default capital: ₹10,000')
          print(f'🎯 Trailing start: ₹150') 
          print(f'📈 Trailing increment: ₹100')
          print(f'⏰ Market hours: 9:15 AM - 3:30 PM IST')
          print(f'🔧 Max position size: 2 lots')
          print(f'📋 Lot size: 75 shares')
          print('🎯 System ready for trading!')
          "
      
      - name: 📁 Create Output Directories
        run: |
          mkdir -p logs reports data
          echo "📁 Created: logs/, reports/, data/"
      
      - name: 🚀 Execute Trading Session
        env:
          API_KEY: ${{ secrets.API_KEY }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          TRADING_CAPITAL: ${{ env.TRADING_CAPITAL }}
          LIVE_TRADING_MODE: ${{ env.LIVE_TRADING_MODE }}
          LOG_LEVEL: ${{ env.LOG_LEVEL }}
          MAX_DAILY_TRADES: ${{ env.MAX_DAILY_TRADES }}
        run: |
          echo "🎯 Starting NIFTY Options Trading Session"
          echo "⏰ Session Start: $(date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "💼 Mode: ${{ env.LIVE_TRADING_MODE == 'true' && 'LIVE TRADING 🔴' || 'SIMULATION 🟡' }}"
          echo "💰 Capital: ₹${{ env.TRADING_CAPITAL }}"
          echo "📊 Max Trades: ${{ env.MAX_DAILY_TRADES }}"
          echo ""
          
          # Run trading with timeout (6 hours max)
          timeout 6h python main.py || {
            exit_code=$?
            
            if [ $exit_code -eq 124 ]; then
              echo "⏰ Trading session timed out (6 hours reached)"
              echo "✅ Normal timeout - market session completed"
              exit 0
            elif [ $exit_code -eq 78 ]; then
              echo "📅 Non-trading day detected"
              echo "✅ System correctly identified market closure"
              exit 0
            elif [ $exit_code -eq 0 ]; then
              echo "✅ Trading session completed successfully"
              exit 0
            else
              echo "❌ Trading session failed (exit code: $exit_code)"
              echo "Check logs for details"
              exit $exit_code
            fi
          }
          
          echo ""
          echo "⏰ Session End: $(date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "📊 Check artifacts for detailed reports"
      
      - name: 📊 Generate Session Summary
        if: always()
        run: |
          echo "# 📈 Trading Session Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**📅 Date:** $(date +'%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "**🕐 Time:** $(date +'%H:%M:%S %Z')" >> $GITHUB_STEP_SUMMARY
          echo "**💼 Mode:** ${{ env.LIVE_TRADING_MODE == 'true' && '🔴 LIVE TRADING' || '🟡 SIMULATION' }}" >> $GITHUB_STEP_SUMMARY
          echo "**💰 Capital:** ₹${{ env.TRADING_CAPITAL }}" >> $GITHUB_STEP_SUMMARY
          echo "**📊 Max Trades:** ${{ env.MAX_DAILY_TRADES }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Configuration summary
          echo "## ⚙️ Trading Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **Lot Size:** 75 shares" >> $GITHUB_STEP_SUMMARY
          echo "- **Max Position Size:** 2 lots" >> $GITHUB_STEP_SUMMARY
          echo "- **Trailing Start:** ₹150 profit" >> $GITHUB_STEP_SUMMARY
          echo "- **Trailing Increment:** ₹100" >> $GITHUB_STEP_SUMMARY
          echo "- **Stop Loss:** 5% of deployed capital" >> $GITHUB_STEP_SUMMARY
          echo "- **Capital Utilization:** Max 80%" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Add daily report if exists
          REPORT_FILE="reports/daily_report_$(date +'%Y-%m-%d').md"
          if [ -f "$REPORT_FILE" ]; then
            echo "## 📋 Daily Trading Report" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            head -n 50 "$REPORT_FILE" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ No Trading Report Generated" >> $GITHUB_STEP_SUMMARY
            echo "This is normal for:" >> $GITHUB_STEP_SUMMARY
            echo "- Non-market hours" >> $GITHUB_STEP_SUMMARY
            echo "- Weekend/holidays" >> $GITHUB_STEP_SUMMARY
            echo "- No trading opportunities" >> $GITHUB_STEP_SUMMARY
            echo "- System testing" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Add log summary if exists
          LOG_FILE="logs/trading_$(date +'%Y-%m-%d').log"
          if [ -f "$LOG_FILE" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## 📜 Log Summary" >> $GITHUB_STEP_SUMMARY
            echo "- **Total Lines:** $(wc -l < "$LOG_FILE" 2>/dev/null || echo 0)" >> $GITHUB_STEP_SUMMARY
            echo "- **Errors:** $(grep -c 'ERROR' "$LOG_FILE" 2>/dev/null || echo 0)" >> $GITHUB_STEP_SUMMARY
            echo "- **Warnings:** $(grep -c 'WARNING' "$LOG_FILE" 2>/dev/null || echo 0)" >> $GITHUB_STEP_SUMMARY
            echo "- **Trades:** $(grep -c 'TRADE_COMPLETED' "$LOG_FILE" 2>/dev/null || echo 0)" >> $GITHUB_STEP_SUMMARY
            echo "- **Positions:** $(grep -c 'NEW POSITION CREATED' "$LOG_FILE" 2>/dev/null || echo 0)" >> $GITHUB_STEP_SUMMARY
          fi
          
          # System info
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🖥️ System Info" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-latest" >> $GITHUB_STEP_SUMMARY
          echo "- **Python:** $(python --version)" >> $GITHUB_STEP_SUMMARY
          echo "- **Timezone:** Asia/Kolkata" >> $GITHUB_STEP_SUMMARY
          echo "- **Run Number:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
      
      - name: 📦 Upload Trading Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trading-session-${{ github.run_number }}
          path: |
            logs/
            reports/
            data/
          retention-days: 30
          compression-level: 6
      
      - name: 🚨 Alert on Live Trading Failure
        if: failure() && env.LIVE_TRADING_MODE == 'true'
        run: |
          echo "🚨 CRITICAL ALERT: Live trading session failed!"
          echo "📅 Date: $(date)"
          echo "💻 Run: ${{ github.run_number }}"
          echo "🔗 URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
          echo "⚠️ IMMEDIATE ACTION REQUIRED:"
          echo "1. Check logs for errors"
          echo "2. Verify API credentials"
          echo "3. Check account status"
          echo "4. Review open positions manually"
          echo "5. Contact broker if needed"

  cleanup:
    name: 🧹 Cleanup & Archive
    needs: trading
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: 📥 Download Session Artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: trading-session-*
          merge-multiple: true
      
      - name: 📦 Create Archive
        run: |
          if [ -d "logs" ] || [ -d "reports" ]; then
            DATE=$(date +'%Y%m%d-%H%M%S')
            tar -czf "nifty-trading-archive-$DATE.tar.gz" logs/ reports/ data/ 2>/dev/null || true
            echo "📦 Archive created: nifty-trading-archive-$DATE.tar.gz"
            
            # Show archive contents
            if [ -f "nifty-trading-archive-$DATE.tar.gz" ]; then
              echo "📋 Archive contents:"
              tar -tzf "nifty-trading-archive-$DATE.tar.gz" | head -20
            fi
          else
            echo "📭 No files to archive"
          fi
      
      - name: 📊 Session Stats
        run: |
          echo "📈 Trading Session Statistics"
          echo "=============================="
          echo "📅 Date: $(date +'%Y-%m-%d')"
          echo "🕐 Time: $(date +'%H:%M:%S %Z')"
          echo "🔢 Run Number: ${{ github.run_number }}"
          echo "💰 Capital Used: ₹${{ needs.trading.env.TRADING_CAPITAL || '10000' }}"
          echo "📊 Max Trades: ${{ needs.trading.env.MAX_DAILY_TRADES || '8' }}"
          echo "🎯 Mode: ${{ needs.trading.env.LIVE_TRADING_MODE == 'true' && 'LIVE' || 'SIMULATION' }}"
          echo "✅ Workflow completed successfully"
